name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - pyproject.toml
      - uv.lock
      - .github/workflows/ci.yml

  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - pyproject.toml
      - uv.lock
      - .github/workflows/ci.yml

  workflow_call:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v
